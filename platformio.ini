; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = wemos_d1_mini  ; Среда по умолчанию

; Глобальные настройки проекта
[env]
platform = espressif8266      ; Платформа ESP8266
framework = arduino           ; Используем Arduino Framework
monitor_speed = 115200        ; Скорость Serial-монитора
monitor_filters = time        ; Добавляем временную метку в монитор
lib_deps =                    ; Зависимости библиотек
    adafruit/Adafruit BME280 Library@^2.2.2
    adafruit/Adafruit Unified Sensor@^1.1.6
    mh-z19@^1.5.4
    https://github.com/todd-herbert/heltec-eink-modules.git
build_flags =                 ; Флаги компиляции
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH
    -I./include
    -I./src
    ;-Wl,-Teagle.flash.4m3m.ld  ; Оптимизация памяти для 4MB flash
    -DESP8266
    -DFP_IN_IROM
    -DVTABLES_IN_FLASH
    ; restrict to minimal mime-types
    -DMIMETYPE_MINIMAL
    ; Heltec E-Ink display type
    -DUSE_213_BWR
    ; Suppress warnings from Heltec E-Ink library
    -Wno-return-type
    -Wno-unused-variable
lib_archive = false           ; Не создавать архив библиотек (ускоряет сборку)
upload_speed = 115200         ; Скорость загрузки для ESP8266
upload_protocol = esptool
board_build.ldscript = eagle.flash.2m512.ld

; Среда для Wemos D1 Mini (ESP-WROOM-02)
[env:wemos_d1_mini]
board = esp_wroom_02               ; Плата Wemos D1 Mini
; change microcontroller
board_build.mcu = esp8266
board_build.f_cpu = 80000000L ; Тактовая частота 80MHz
board_build.f_flash = 80000000L ; Частота flash
board_build.flash_mode = dio  ; Режим работы с flash
board_build.ldscript = eagle.flash.4m3m.ld ; Скрипт линковки для 4MB flash
upload_port =                 ; Автоматическое определение порта
; Для ручного указания порта (раскомментировать и указать свой):
; upload_port = COM3         ; Windows
; upload_port = /dev/ttyUSB0 ; Linux
; upload_port = /dev/tty.usbserial-* ; macOS
build_flags = ${env.build_flags}
    ; Отладочные опции (раскомментировать при необходимости):
    ; -D DEBUG_SERIAL=1      ; Включить отладочный вывод
    ; -D SENSOR_I2C_ADDRESS=0x76  ; Принудительно указать адрес BME280
    ; Оптимизация по размеру кода:
    -Os                     ; Оптимизация по размеру
    ; Настройки для уменьшения размера кода:
    -ffunction-sections
    -fdata-sections
    -Wl,-gc-sections

; Среда для отладки с дополнительной информацией
[env:wemos_d1_mini_debug]
extends = env:wemos_d1_mini   ; Наследуем основную конфигурацию
build_flags = ${env.build_flags}
    -D DEBUG_MODE=1          ; Включить режим отладки
    -D SERIAL_DEBUG=1        ; Расширенный вывод в Serial
    -g                      ; Включить отладочную информацию
    ; Увеличиваем размер буфера Serial для отладки:
    -D SERIAL_BUFFER_SIZE=256
monitor_filters = time, debug  ; Фильтры для монитора

; Среда для профилирования производительности
[env:wemos_d1_mini_perf]
extends = env:wemos_d1_mini
build_flags = ${env.build_flags}
    -O2                     ; Оптимизация по скорости (больший размер кода)
    -D PERFORMANCE_MODE=1   ; Режим максимальной производительности
    ; Отключаем неиспользуемые компоненты Arduino:
    -D LWIP_OPEN_SRC
    -DTCP_MSS=536
    -DTCP_WND=2144

; Среда для релиза (минимальный размер)
[env:wemos_d1_mini_release]
extends = env:wemos_d1_mini
build_flags = ${env.build_flags}
    -Os                     ; Максимальная оптимизация по размеру
    -D RELEASE_MODE=1       ; Режим релиза
    ; Убираем всю отладочную информацию:
    -Wl,--strip-all
    ; Минимизируем использование Serial:
    -D DISABLE_SERIAL_OUTPUT=0  ; Оставляем только необходимый вывод
upload_speed = 115200       ; Более стабильная скорость загрузки для релиза

; Конфигурация для тестирования
[env:test_native]
platform = native            ; Для тестирования на ПК
framework = arduino
lib_deps = 
    adafruit/Adafruit BME280 Library@^2.2.2
    adafruit/Adafruit Unified Sensor@^1.1.6
build_flags = 
    -D UNIT_TEST=1          ; Флаг для unit-тестов
    -D NATIVE_ENV=1         ; Флаг для нативной среды
test_framework = unity       ; Используем Unity для тестирования

; Конфигурация монитора порта
[monitor]
port =                       ; Автоматический выбор порта
baud = 115200                ; Скорость по умолчанию
filters = time               ; Добавляем временную метку
echo = yes                   ; Локальное эхо
eol = CRLF                   ; Конец строки
rts = 0                      ; Контроль RTS
dtr = 0                      ; Контроль DTR

; Настройки для PlatformIO Home
[platformio_home]
show_platformio_ini = true   ; Показывать этот файл в интерфейсе

; Кастомные команды для удобства разработки
[platformio_custom]
; Команда для очистки и пересборки
rebuild = pio run --target clean && pio run

; Команда для загрузки и мониторинга
upload_and_monitor = pio run --target upload && pio device monitor

; Команда для тестирования
run_tests = pio test -e test_native

; Команда для проверки размера памяти
check_size = pio run --target size